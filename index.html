<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>IPTV Lite</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: #fff;
    font-family: sans-serif;
    font-size: 14px;
    overflow: hidden;
  }
  #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .screen { display: none; flex: 1; flex-direction: column; padding: 6px; overflow-y: auto; }
  .screen.active { display: flex; }
  h1 { font-size: 15px; margin-bottom: 6px; }
  label { font-size: 12px; color: #aaa; margin-top: 4px; }
  input {
    width: 100%; font-size: 14px; padding: 4px;
    background: #111; color: #fff; border: 1px solid #555;
    margin-bottom: 4px;
  }
  .btn {
    display: block; width: 100%; padding: 6px; margin-top: 8px;
    background: #222; color: #fff; border: 1px solid #555;
    text-align: center; font-size: 14px;
  }
  .btn.focused, li.focused { background: #2a6fd6; border-color: #2a6fd6; }
  ul { list-style: none; flex: 1; overflow-y: auto; }
  li {
    padding: 6px 4px; border-bottom: 1px solid #222;
    font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status { font-size: 12px; color: #f55; margin-top: 4px; min-height: 14px; }
  .hint { font-size: 11px; color: #666; margin-top: 6px; }
  video { width: 100%; height: 100%; background: #000; }
  #playerScreen { padding: 0; }
  #backBtn {
    position: absolute; top: 4px; left: 4px; font-size: 11px;
    background: rgba(0,0,0,0.6); padding: 2px 6px; z-index: 10;
  }
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN SCREEN -->
  <div class="screen active" id="loginScreen">
    <h1>IPTV Lite Login</h1>
    <label>Server URL (e.g. http://server:port)</label>
    <input id="serverInput" type="text" autocomplete="off">
    <label>Username</label>
    <input id="userInput" type="text" autocomplete="off">
    <label>Password</label>
    <input id="passInput" type="password" autocomplete="off">
    <div class="btn focused" id="loginBtn" tabindex="0">Connect</div>
    <div class="status" id="loginStatus"></div>
    <div class="hint">Use arrow keys + Enter to navigate</div>
  </div>

  <!-- CATEGORY SCREEN -->
  <div class="screen" id="catScreen">
    <h1>Categories</h1>
    <ul id="catList"></ul>
    <div class="status" id="catStatus"></div>
  </div>

  <!-- CHANNEL SCREEN -->
  <div class="screen" id="chanScreen">
    <h1 id="chanTitle">Channels</h1>
    <ul id="chanList"></ul>
    <div class="status" id="chanStatus"></div>
  </div>

  <!-- PLAYER SCREEN -->
  <div class="screen" id="playerScreen">
    <div id="backBtn">&laquo; Back (0)</div>
    <video id="video" controls autoplay playsinline></video>
  </div>

</div>

<script>
/* ---------- State ---------- */
var state = {
  server: '', user: '', pass: '',
  categories: [], channels: [],
  focusIndex: 0
};

/* ---------- Storage (remember login) ---------- */
try {
  var saved = JSON.parse(localStorage.getItem('iptvlite_login') || 'null');
  if (saved) {
    document.getElementById('serverInput').value = saved.server || '';
    document.getElementById('userInput').value = saved.user || '';
    document.getElementById('passInput').value = saved.pass || '';
  }
} catch (e) {}

/* ---------- Screen switching ---------- */
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

/* ---------- Simple focus-based nav helper ---------- */
function FocusList(container, onSelect) {
  this.container = container;
  this.items = [];
  this.index = 0;
  this.onSelect = onSelect;
}
FocusList.prototype.setItems = function (items) {
  this.items = items;
  this.index = 0;
  this.render();
};
FocusList.prototype.render = function () {
  for (var i = 0; i < this.container.children.length; i++) {
    this.container.children[i].classList.toggle('focused', i === this.index);
  }
};
FocusList.prototype.move = function (dir) {
  if (!this.items.length) return;
  this.index = (this.index + dir + this.items.length) % this.items.length;
  this.render();
  var el = this.container.children[this.index];
  if (el && el.scrollIntoView) el.scrollIntoView({ block: 'nearest' });
};
FocusList.prototype.select = function () {
  if (this.items.length) this.onSelect(this.items[this.index], this.index);
};

var catFocus = null, chanFocus = null;

/* ---------- API helpers ---------- */
function apiUrl(action, extra) {
  var u = state.server.replace(/\/$/, '') + '/player_api.php?username=' +
    encodeURIComponent(state.user) + '&password=' + encodeURIComponent(state.pass);
  if (action) u += '&action=' + action;
  if (extra) u += extra;
  return u;
}

function fetchJson(url, cb, errCb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onload = function () {
    if (xhr.status >= 200 && xhr.status < 300) {
      try { cb(JSON.parse(xhr.responseText)); }
      catch (e) { errCb('Bad response from server'); }
    } else {
      errCb('Server error: ' + xhr.status);
    }
  };
  xhr.onerror = function () { errCb('Network error - check server URL / WiFi'); };
  xhr.ontimeout = function () { errCb('Connection timed out'); };
  xhr.send();
}

/* ---------- Login ---------- */
function doLogin() {
  state.server = document.getElementById('serverInput').value.trim();
  state.user = document.getElementById('userInput').value.trim();
  state.pass = document.getElementById('passInput').value.trim();
  var statusEl = document.getElementById('loginStatus');

  if (!state.server || !state.user || !state.pass) {
    statusEl.textContent = 'Please fill in all fields';
    return;
  }
  if (!/^https?:\/\//i.test(state.server)) {
    state.server = 'http://' + state.server;
  }

  statusEl.textContent = 'Connecting...';
  fetchJson(apiUrl(null), function (data) {
    if (data && data.user_info && data.user_info.auth === 1) {
      try {
        localStorage.setItem('iptvlite_login', JSON.stringify({
          server: state.server, user: state.user, pass: state.pass
        }));
      } catch (e) {}
      statusEl.textContent = '';
      loadCategories();
    } else {
      statusEl.textContent = 'Login failed - check credentials';
    }
  }, function (msg) {
    statusEl.textContent = msg;
  });
}

/* ---------- Categories ---------- */
function loadCategories() {
  document.getElementById('catStatus').textContent = 'Loading...';
  showScreen('catScreen');
  fetchJson(apiUrl('get_live_categories'), function (data) {
    state.categories = data || [];
    document.getElementById('catStatus').textContent = '';
    renderCategories();
  }, function (msg) {
    document.getElementById('catStatus').textContent = msg;
  });
}

function renderCategories() {
  var ul = document.getElementById('catList');
  ul.innerHTML = '';
  state.categories.forEach(function (cat) {
    var li = document.createElement('li');
    li.textContent = cat.category_name;
    ul.appendChild(li);
  });
  catFocus = new FocusList(ul, function (cat) {
    loadChannels(cat);
  });
  catFocus.setItems(state.categories);
}

/* ---------- Channels ---------- */
function loadChannels(cat) {
  document.getElementById('chanTitle').textContent = cat.category_name;
  document.getElementById('chanStatus').textContent = 'Loading...';
  showScreen('chanScreen');
  fetchJson(apiUrl('get_live_streams', '&category_id=' + encodeURIComponent(cat.category_id)), function (data) {
    state.channels = data || [];
    document.getElementById('chanStatus').textContent = '';
    renderChannels();
  }, function (msg) {
    document.getElementById('chanStatus').textContent = msg;
  });
}

function renderChannels() {
  var ul = document.getElementById('chanList');
  ul.innerHTML = '';
  state.channels.forEach(function (ch) {
    var li = document.createElement('li');
    li.textContent = ch.name;
    ul.appendChild(li);
  });
  chanFocus = new FocusList(ul, function (ch) {
    playChannel(ch);
  });
  chanFocus.setItems(state.channels);
}

/* ---------- Player ---------- */
function streamUrl(ch) {
  return state.server.replace(/\/$/, '') + '/live/' +
    encodeURIComponent(state.user) + '/' + encodeURIComponent(state.pass) + '/' +
    ch.stream_id + '.m3u8';
}

function playChannel(ch) {
  var video = document.getElementById('video');
  video.src = streamUrl(ch);
  showScreen('playerScreen');
  video.play().catch(function () {});
}

function stopPlayer() {
  var video = document.getElementById('video');
  video.pause();
  video.removeAttribute('src');
  video.load();
  showScreen('chanScreen');
}

/* ---------- Keyboard / keypad navigation ---------- */
/* Most feature-phone browsers map D-pad to arrow keys and the
   center/OK key to Enter. Numeric "0" doubles as Back here. */
document.addEventListener('keydown', function (e) {
  var key = e.key;
  var loginScreenActive = document.getElementById('loginScreen').classList.contains('active');
  var catActive = document.getElementById('catScreen').classList.contains('active');
  var chanActive = document.getElementById('chanScreen').classList.contains('active');
  var playerActive = document.getElementById('playerScreen').classList.contains('active');

  if (playerActive) {
    if (key === '0' || key === 'Backspace' || key === 'SoftLeft') {
      stopPlayer();
      e.preventDefault();
    }
    return;
  }

  if (loginScreenActive) {
    if (key === 'Enter' && document.activeElement.id === 'loginBtn') {
      doLogin();
      e.preventDefault();
    }
    return;
  }

  if (catActive && catFocus) {
    if (key === 'ArrowDown') { catFocus.move(1); e.preventDefault(); }
    else if (key === 'ArrowUp') { catFocus.move(-1); e.preventDefault(); }
    else if (key === 'Enter') { catFocus.select(); e.preventDefault(); }
    else if (key === '0' || key === 'Backspace') { showScreen('loginScreen'); e.preventDefault(); }
    return;
  }

  if (chanActive && chanFocus) {
    if (key === 'ArrowDown') { chanFocus.move(1); e.preventDefault(); }
    else if (key === 'ArrowUp') { chanFocus.move(-1); e.preventDefault(); }
    else if (key === 'Enter') { chanFocus.select(); e.preventDefault(); }
    else if (key === '0' || key === 'Backspace') { showScreen('catScreen'); e.preventDefault(); }
    return;
  }
});

/* Mouse/touch tap support as a fallback (in case the cloud browser
   forwards taps instead of key events) */
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('backBtn').addEventListener('click', stopPlayer);
document.getElementById('catList').addEventListener('click', function (e) {
  var li = e.target.closest('li');
  if (!li || !catFocus) return;
  var idx = Array.prototype.indexOf.call(li.parentNode.children, li);
  catFocus.index = idx;
  catFocus.select();
});
document.getElementById('chanList').addEventListener('click', function (e) {
  var li = e.target.closest('li');
  if (!li || !chanFocus) return;
  var idx = Array.prototype.indexOf.call(li.parentNode.children, li);
  chanFocus.index = idx;
  chanFocus.select();
});

document.getElementById('loginBtn').focus();
</script>
</body>
</html>
